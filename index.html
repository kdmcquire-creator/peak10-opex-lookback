<style>

  nav button { background: transparent; border: none; color: var(--text-dim); padding: 12px 18px;
               cursor: pointer; font-size: 13px; font-family: inherit; border-bottom: 2px solid transparent;
               transition: all 0.15s; }
  nav button:hover { color: var(--text); }
  nav button.active { color: var(--text); border-bottom-color: var(--accent); }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
           padding: 18px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .grid-3, .grid-4, .grid-2 { grid-template-columns: 1fr; } }
  .kpi-label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .kpi-value { font-size: 18px; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; }
  .chart-wrap { position: relative; height: 300px; margin-top: 10px; }
  .chart-wrap.tall { height: 360px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; }
  th { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
       color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:hover td { background: var(--panel2); }
  .num { text-align: right; }
  .asset-hawkeye { color: var(--hawkeye); }
  .asset-strawn { color: var(--strawn); }
  .asset-reeves { color: var(--reeves); }
  .asset-genesis { color: var(--genesis); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600;
           text-transform: uppercase; letter-spacing: 0.05em; }
  .badge.high { background: rgba(255, 118, 118, 0.15); color: var(--red); border: 1px solid rgba(255, 118, 118, 0.3); }
  .badge.medium { background: rgba(255, 179, 71, 0.15); color: var(--amber); border: 1px solid rgba(255, 179, 71, 0.3); }
  .badge.low { background: rgba(126, 209, 168, 0.15); color: var(--green); border: 1px solid rgba(126, 209, 168, 0.3); }
  .badge.net { background: rgba(232, 232, 234, 0.1); color: var(--text); }
  .badge.wi100 { background: rgba(122, 181, 255, 0.15); color: var(--wi100); }
  .badge.gross { background: rgba(126, 209, 168, 0.15); color: var(--gross); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .exc.low { border-left-color: var(--green); }
  .exc-header { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
  .exc-finding { color: var(--text); font-size: 12px; }
  .exc-handling { color: var(--text-dim); font-size: 12px; margin-top: 6px; font-style: italic; }
  input[type="text"], select {

    padding: 7px 10px; border-radius: 4px; font-size: 12px; font-family: inherit;
  }
  .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .dim { color: var(--text-dim); }

<script>
const DATA = JSON.parse(document.getElementById("data-json").textContent);
const ASSET_COLOR = { Hawkeye:"#e87a5d", Strawn:"#7ab5ff", Reeves:"#b788ff", Genesis:"#7ed1a8", Consolidated:"#e8e8ea" };
const BASIS_COLOR = { Net:"#e8e8ea", Gross:"#7ed1a8" };
const BASIS_LABEL = { Net:"Net (Peak 10)", Gross:"Gross LOS" };

Chart.defaults.color = "#9a9aa0";
Chart.defaults.borderColor = "#2a2a30";
Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
Chart.defaults.font.size = 11;

// Legend click uses Chart.js default behavior: each click toggles a single
// series on/off. This enables multi-select - hide one, hide another, show one
// that was hidden, etc. (This replaces the prior "isolate on single click"
// behavior that the user reported as broken.)
// DOUBLE-CLICK a legend item to isolate it (show only that series).
// Double-click again on the same item to restore all series.
function attachLegendDblClick(chart) {
  if (!chart.canvas) return;
  chart.canvas.addEventListener("dblclick", function(ev) {
    const legend = chart.legend;
    if (!legend || !legend.legendHitBoxes) return;
    const rect = chart.canvas.getBoundingClientRect();
    const x = ev.clientX - rect.left;
    const y = ev.clientY - rect.top;
    for (let i = 0; i < legend.legendHitBoxes.length; i++) {
      const box = legend.legendHitBoxes[i];
      if (x >= box.left && x <= box.left + box.width &&
          y >= box.top  && y <= box.top  + box.height) {
        const metas = chart.data.datasets.map(function(_, idx){ return chart.getDatasetMeta(idx); });
        const visibleCount = metas.filter(function(m){ return !m.hidden; }).length;
        const onlyThis = visibleCount === 1 && !metas[i].hidden;
        if (onlyThis) {
          metas.forEach(function(m){ m.hidden = false; });
        } else {
          metas.forEach(function(m, idx){ m.hidden = (idx !== i); });
        }
        chart.update();
        ev.preventDefault();
        return;
      }
    }
  });
}

// Patch Chart constructor so every chart gets the dblclick handler automatically
const _OriginalChart = Chart;
function ChartWithDbl() {
  const instance = new _OriginalChart(...arguments);
  setTimeout(function(){ attachLegendDblClick(instance); }, 50);
  return instance;
}
ChartWithDbl.defaults = _OriginalChart.defaults;
ChartWithDbl.register = _OriginalChart.register.bind(_OriginalChart);
window.Chart = ChartWithDbl;

function el(tag, opts, ...children) {
  opts = opts || {};
  const e = document.createElement(tag);
  if (opts.cls) e.className = opts.cls;
  if (opts.id) e.id = opts.id;
  if (opts.text !== undefined) e.textContent = opts.text;
  if (opts.style) e.setAttribute("style", opts.style);
  if (opts.attrs) for (const k of Object.keys(opts.attrs)) e.setAttribute(k, opts.attrs[k]);
  for (const c of children) if (c != null) e.appendChild(typeof c==="string" ? document.createTextNode(c) : c);
  return e;
}

const fmtMoney = function(n) {
  if (n === null || n === undefined || isNaN(n)) return "-";
  if (n === 0) return "$0";
  const sign = n < 0 ? "-" : "";
  const abs = Math.abs(n);
  if (abs >= 1e9) return sign + "$" + (abs/1e9).toFixed(2) + "B";
  if (abs >= 1e6) return sign + "$" + (abs/1e6).toFixed(2) + "M";
  if (abs >= 1e3) return sign + "$" + (abs/1e3).toFixed(0) + "k";
  return sign + "$" + abs.toFixed(0);
};
const fmtMoneyFull = function(n) { return (n===null||n===undefined||isNaN(n)) ? "-" : ((n<0?"-":"") + "$" + Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0})); };
const fmtMoney2 = function(n) { return (n===null||n===undefined||isNaN(n)) ? "-" : ((n<0?"-":"") + "$" + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})); };
const fmtNum = function(n) { return (n===null||n===undefined||isNaN(n)) ? "-" : Math.round(n).toLocaleString("en-US"); };
const fmtPct = function(n, dec) { return (n===null||n===undefined||isNaN(n)) ? "-" : (n*100).toFixed(dec===undefined?1:dec) + "%"; };

function getAnnual(asset, year, basis) {
  return DATA.annual.find(a => a.Asset===asset && a.Year===year && a.Basis===basis);
}

// Global activity filter state. Threshold applied on Gross avg BOE/d.
// Wells below the threshold for a given year are excluded ONLY from
// Fix $/Well-Mo and Workover $/Well-Mo (both numerator and denominator).
// Revenue, volumes, BOE, Variable Opex are all unchanged.
const ACTIVITY_THRESHOLDS = (DATA.activity_filter && DATA.activity_filter.thresholds) || [0, 0.5, 1, 2, 5];
let ACTIVITY_THRESHOLD = (DATA.activity_filter && DATA.activity_filter.default) || 1.0;

// Listeners invoked when threshold changes so dependent views re-render
const ACTIVITY_LISTENERS = [];
function onActivityChange(fn) { ACTIVITY_LISTENERS.push(fn); }
function setActivityThreshold(v) {
  ACTIVITY_THRESHOLD = parseFloat(v);
  ACTIVITY_LISTENERS.forEach(function(fn){ try { fn(); } catch(e){ console.error(e); } });
}

// Annual filtered values for (asset, year, basis). Returns {Fixed_per_Wellmo, Workover_per_Wellmo}
// or null if filter is off / data missing.
function getFilteredAnnual(asset, year, basis) {
  const af = DATA.activity_filter;
  if (!af || ACTIVITY_THRESHOLD === 0) return null;
  const pack = af.series[String(ACTIVITY_THRESHOLD)];
  if (!pack || !pack[basis] || !pack[basis][asset]) return null;
  let sumFix = 0, sumWO = 0, sumWells = 0;
  for (let m = 1; m <= 12; m++) {
    const key = year + "-" + (m<10?"0":"") + m;
    const v = pack[basis][asset][key];
    if (v) { sumFix += v.Fixed; sumWO += v.WO; sumWells += v.Wells; }
  }
  return {
    Fixed_per_Wellmo: sumWells ? sumFix/sumWells : 0,
    Workover_per_Wellmo: sumWells ? sumWO/sumWells : 0,
  };
}

// Fetch filtered Fixed/WO/Wells for a (basis, asset, year, month) given current threshold
function getFiltered(basis, asset, year, month) {
  const af = DATA.activity_filter;
  if (!af) return null;
  const pack = af.series[String(ACTIVITY_THRESHOLD)];
  if (!pack) return null;
  const byAsset = pack[basis];
  if (!byAsset || !byAsset[asset]) return null;
  const key = year + "-" + (month < 10 ? "0" : "") + month;
  return byAsset[asset][key] || null;
}

// Count excluded wells in a given year at current threshold
function excludedWellsForYear(year) {
  const af = DATA.activity_filter;
  if (!af) return {excluded: 0, total: 0};
  const wa = af.well_activity.filter(function(w){ return w.Year === year; });
  const excluded = wa.filter(function(w){ return w.Gross_AvgBOEd < ACTIVITY_THRESHOLD; });
  return {excluded: excluded.length, total: wa.length, list: excluded};
}

// Build the activity filter control widget (re-usable across tabs)
function buildActivityFilter(parentEl, yearForCount) {
  const wrap = el("div",{style:"display:inline-flex; align-items:center; gap:6px; padding:5px 10px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; margin-left:8px;"});
  wrap.appendChild(el("span",{cls:"dim",style:"font-size:11px;",text:"Activity filter:"}));
  const sel = el("select");
  ACTIVITY_THRESHOLDS.forEach(function(t){
    const o = el("option",{text:t===0?"Off (all wells)":"≥ "+t+" BOE/d",attrs:{value:String(t)}});
    if (t === ACTIVITY_THRESHOLD) o.setAttribute("selected","");
    sel.appendChild(o);
  });
  sel.addEventListener("change", function(){ setActivityThreshold(sel.value); });
  wrap.appendChild(sel);
  const info = el("span",{cls:"dim",style:"font-size:11px;"});
  const updateInfo = function() {
    const counts = excludedWellsForYear(yearForCount || 2025);
    info.textContent = ACTIVITY_THRESHOLD > 0
      ? "(" + counts.excluded + " of " + counts.total + " wells excluded in " + (yearForCount||2025) + ")"
      : "";
  };
  updateInfo();
  wrap.appendChild(info);
  onActivityChange(updateInfo);
  parentEl.appendChild(wrap);
  return {widget: wrap, updateInfo: updateInfo};
}

function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function renderSummary() {
  const root = document.getElementById("tab-summary");
  clear(root);

  root.appendChild(el("h2", {text:"2025 Headline - Net vs Gross"}));
  root.appendChild(el("div", {cls:"subtitle", style:"margin-bottom:8px;", text:"Same LOS data viewed two ways: what Peak 10 received/paid (Net), and the full Gross LOS - costs scaled by 1/WI, volumes and revenue by 1/NRI (per-well). Ad val is normalized to active-months basis in all views."}));
  const actRow = el("div",{style:"margin-bottom:14px;"});
  buildActivityFilter(actRow, 2025);
  actRow.appendChild(el("span",{cls:"dim",style:"font-size:11px; margin-left:10px;",text:"Fixed $/Well-Mo and Workover $/Well-Mo use wells at or above the threshold. All other metrics unchanged."}));
  root.appendChild(actRow);

  const bases = ["Net","Gross"];
  const grid = el("div", {cls:"grid-2"});
  for (const b of bases) {
    const r = getAnnual("Consolidated", 2025, b);
    if (!r) continue;
    const p = el("div", {cls:"panel", style:"padding:20px;"});
    const bd = el("div");
    const bcls = b==="Net"?"net":"gross";
    bd.appendChild(el("span", {cls:"badge " + bcls, text:BASIS_LABEL[b]}));
    p.appendChild(bd);
    p.appendChild(el("h3", {style:"margin-top:12px;", text:"2025 Consolidated (4 assets)"}));
    const g = el("div", {cls:"grid-2", style:"gap:10px;"});
    const addKpi = function(label, val) {
      const d = el("div");
      d.appendChild(el("div",{cls:"kpi-label",text:label}));
      d.appendChild(el("div",{cls:"kpi-value",text:val}));
      g.appendChild(d);
    };
    addKpi("Revenue", fmtMoney(r.Gross_Revenue));
    addKpi("BOE", fmtNum(r.BOE));
    addKpi("Realized $/BOE", fmtMoney2(r.Realized_per_BOE));
    addKpi("Total Cash LOE $/BOE", fmtMoney2(r.Total_Cash_per_BOE));
    const filt = getFilteredAnnual("Consolidated", 2025, b);
    const fixV = filt ? filt.Fixed_per_Wellmo : r.Fixed_per_Wellmo;
    const woV  = filt ? filt.Workover_per_Wellmo : r.Workover_per_Wellmo;
    addKpi("Fixed $/Well-Mo", fmtMoney(fixV));
    addKpi("Var $/BOE", fmtMoney2(r.Var_per_BOE));
    addKpi("Workover $/Well-Mo", fmtMoney(woV));
    addKpi("Capex", fmtMoney(r.Total_Capex));
    p.appendChild(g);
    grid.appendChild(p);
  }
  root.appendChild(grid);

  root.appendChild(el("h2",{text:"2025 By Asset - Net (Peak 10)"}));
  const g4 = el("div",{cls:"grid-4"});
  for (const a of ["Hawkeye","Strawn","Reeves","Genesis"]) {
    const r = getAnnual(a, 2025, "Net");
    if (!r) continue;
    const p = el("div",{cls:"panel"});
    p.appendChild(el("h3",{style:"color:"+ASSET_COLOR[a]+"; margin-top:0;",text:a}));
    const g = el("div",{style:"display:grid; grid-template-columns:1fr 1fr; gap:8px;"});
    const add = function(label,val) {
      const d = el("div");
      d.appendChild(el("div",{cls:"kpi-label",text:label}));
      d.appendChild(el("div",{cls:"kpi-value",text:val}));
      g.appendChild(d);
    };
    add("Wells (avg)", r.Avg_Active_Wells.toFixed(1));
    add("BOE", fmtNum(r.BOE));
    add("Revenue", fmtMoney(r.Gross_Revenue));
    const filtA = getFilteredAnnual(a, 2025, "Net");
    const fixA = filtA ? filtA.Fixed_per_Wellmo : r.Fixed_per_Wellmo;
    const woA  = filtA ? filtA.Workover_per_Wellmo : r.Workover_per_Wellmo;
    add("Fixed $/Well-Mo", fmtMoney(fixA));
    add("Var $/BOE", fmtMoney2(r.Var_per_BOE));
    add("Workover $/Well-Mo", fmtMoney(woA));
    p.appendChild(g);
    g4.appendChild(p);
  }
  root.appendChild(g4);

  root.appendChild(el("h2",{text:"Total Cash LOE $/BOE - by Basis (2025)"}));
  const c1 = el("div",{cls:"panel"});
  c1.appendChild(el("canvas",{id:"chart-summary-cashloe",cls:"chart-wrap"}));
  root.appendChild(c1);

  root.appendChild(el("h2",{text:"Fixed Opex $/Well-Month - Monthly Trend (Net, all wells)"}));
  root.appendChild(el("div",{cls:"dim",style:"font-size:11px; margin-top:-6px; margin-bottom:4px;",text:"Chart uses all wells regardless of activity filter — to see filtered values use the Monthly LOS Table tab."}));
  const c2 = el("div",{cls:"panel"});
  c2.appendChild(el("canvas",{id:"chart-summary-fixed",cls:"chart-wrap tall"}));
  root.appendChild(c2);

  const assetsX = ["Hawkeye","Strawn","Reeves","Genesis","Consolidated"];
  new Chart(document.getElementById("chart-summary-cashloe"), {

  flex.appendChild(saY);
  const actWidget = buildActivityFilter(flex, 2025);
  root.appendChild(flex);

  const wrap = el("div",{id:"gross-wrap"});
  root.appendChild(wrap);

  // Compute filtered Fixed/WO $/Well-Mo from precomputed monthly filtered series.
  // Returns {Fixed_per_Wellmo, Workover_per_Wellmo} summed over all months in year.
  const filteredAnnual = function(asset, year, basis) {
    const af = DATA.activity_filter;
    if (!af || ACTIVITY_THRESHOLD === 0) return null; // signal: use un-filtered values from getAnnual
    const pack = af.series[String(ACTIVITY_THRESHOLD)];
    if (!pack || !pack[basis] || !pack[basis][asset]) return null;
    let sumFix = 0, sumWO = 0, sumWells = 0;
    for (let m = 1; m <= 12; m++) {
      const key = year + "-" + (m<10?"0":"") + m;
      const v = pack[basis][asset][key];
      if (v) { sumFix += v.Fixed; sumWO += v.WO; sumWells += v.Wells; }
    }
    return {
      Fixed_per_Wellmo: sumWells ? sumFix/sumWells : 0,
      Workover_per_Wellmo: sumWells ? sumWO/sumWells : 0,
    };
  };

  const renderTable = function() {
    const y = parseInt(document.getElementById("gross-year").value);
    if (actWidget) actWidget.updateInfo();
    clear(wrap);
    const panel = el("div",{cls:"panel",style:"overflow-x:auto;"});

    const thead = el("thead");
    const tr = el("tr");
    tr.appendChild(el("th",{text:"Metric"}));
    ["Hawkeye","Strawn","Reeves","Genesis","Consolidated"].forEach(function(a){ tr.appendChild(el("th",{cls:"num",text:a})); });
    thead.appendChild(tr); table.appendChild(thead);
    const tbody = el("tbody");

      {k:"Active_Months", label:"Active Months", fmt:"int"},
      {k:"Avg_Active_Wells", label:"Avg Active Wells", fmt:"dec"},
      {k:"BOE", label:"BOE", fmt:"num"},
      {k:"Gross_Revenue", label:"Gross Revenue", fmt:"money"},
      {k:"Realized_per_BOE", label:"Realized $/BOE", fmt:"money2"},
      {k:"Gas_Netback", label:"Gas Netback $", fmt:"money"},
      {k:"Gas_Exp_per_Mcf", label:"Gas Exp $/Mcf", fmt:"money2"},
      {k:"Severance", label:"Severance $", fmt:"money"},
      {k:"Sev_pct", label:"Severance % Rev", fmt:"pct"},
      {k:"Adval", label:"Ad Val $ (normalized)", fmt:"money"},
      {k:"Adval_pct", label:"Ad Val % Rev", fmt:"pct"},
      {k:"Var_Opex", label:"Variable Opex $", fmt:"money"},
      {k:"Var_per_BOE", label:"Var $/BOE", fmt:"money2"},
      {k:"Fixed_Opex", label:"Fixed Opex $", fmt:"money"},
      {k:"Fixed_per_Wellmo", label:"Fixed $/Well-Mo", fmt:"money"},
      {k:"Workover", label:"Workover $", fmt:"money"},
      {k:"Workover_per_Wellmo", label:"Workover $/Well-Mo", fmt:"money"},
      {k:"Total_Cash_per_BOE", label:"Total Cash LOE $/BOE", fmt:"money2"},
      {k:"Total_Capex", label:"Total Capex $", fmt:"money"},
      {k:"Net_Revenue", label:"Net Revenue $", fmt:"money"},
      {k:"Cash_Op_Margin", label:"Cash Op Margin $", fmt:"money"},
    ];
    const bases = [["Net","net"], ["Gross","gross"]];
    for (const [b, cls] of bases) {
      const header = el("tr");
      const th = el("td",{style:"background:var(--panel2); font-weight:600;",attrs:{colspan:"6"}});
      th.appendChild(el("span",{cls:"badge "+cls, text:BASIS_LABEL[b]}));
      header.appendChild(th);
      tbody.appendChild(header);
      for (const m of metrics) {
        const rr = el("tr");
        rr.appendChild(el("td",{text:m.label}));
        for (const a of ["Hawkeye","Strawn","Reeves","Genesis","Consolidated"]) {
          const r = getAnnual(a, y, b);
          let v = r ? r[m.k] : null;
          // Override Fix $/Well-Mo and WO $/Well-Mo with filtered values when activity filter is on
          if ((m.k === "Fixed_per_Wellmo" || m.k === "Workover_per_Wellmo") && ACTIVITY_THRESHOLD > 0) {
            const filt = filteredAnnual(a, y, b);
            if (filt !== null) v = filt[m.k];
          }
          let disp = "-";
          if (v !== null && v !== undefined && !isNaN(v)) {
            if (m.fmt==="num") disp = fmtNum(v);
            else if (m.fmt==="int") disp = String(Math.round(v));
            else if (m.fmt==="dec") disp = v.toFixed(1);
            else if (m.fmt==="money") disp = fmtMoney(v);
            else if (m.fmt==="money2") disp = fmtMoney2(v);
            else if (m.fmt==="pct") disp = fmtPct(v);
          }
          rr.appendChild(el("td",{cls:"num",text:disp}));
        }
        tbody.appendChild(rr);
      }
    }
    table.appendChild(tbody);
    panel.appendChild(table);
    wrap.appendChild(panel);

  document.getElementById("gross-year").addEventListener("change", renderTable);

  renderTable();

function renderMonthly() {
  const root = document.getElementById("tab-monthly");
  clear(root);
  root.appendChild(el("h2",{text:"Monthly LOS Table"}));
  root.appendChild(el("div",{cls:"subtitle",style:"margin-bottom:12px;",text:"Month-by-month P&L matching the source LOS format. Select one or more assets; data shown is the SUM of selected assets. Select basis (Net or Gross). Footer rows show derived monthly metrics."}));

  // Controls
  const flex = el("div",{cls:"flex"});
  flex.appendChild(el("label",{cls:"dim",text:"Assets:"}));
  const assets = ["Hawkeye","Strawn","Reeves","Genesis"];
  const assetCtrl = el("div",{style:"display:flex; gap:6px; flex-wrap:wrap;"});
  assets.forEach(function(a){
    const lbl = el("label",{style:"display:inline-flex; align-items:center; gap:5px; background:var(--panel2); border:1px solid var(--border); border-radius:4px; padding:4px 9px; cursor:pointer;"});
    const cb = el("input",{attrs:{type:"checkbox","data-asset":a,"checked":""}});
    cb.checked = true;
    lbl.appendChild(cb);
    const span = el("span",{cls:"asset-"+a.toLowerCase(),style:"font-weight:600;",text:a});
    lbl.appendChild(span);
    assetCtrl.appendChild(lbl);
  });
  flex.appendChild(assetCtrl);
  flex.appendChild(el("label",{cls:"dim",text:"Basis:"}));
  const saB = el("select",{id:"mlos-basis"});
  [["Net","Net (Peak 10)"],["Gross","Gross LOS"]].forEach(function(p){ saB.appendChild(el("option",{text:p[1],attrs:{value:p[0]}})); });
  flex.appendChild(saB);
  flex.appendChild(el("label",{cls:"dim",text:"Years:"}));
  const saY = el("select",{id:"mlos-year"});
  [["all","All"],["2023","2023"],["2024","2024"],["2025","2025"],["2026","2026"]].forEach(function(p){
    const o = el("option",{text:p[1],attrs:{value:p[0]}}); if (p[0]==="all") o.setAttribute("selected",""); saY.appendChild(o);
  });
  flex.appendChild(saY);
  buildActivityFilter(flex, 2025);
  root.appendChild(flex);

  const wrap = el("div",{id:"mlos-wrap"});
  root.appendChild(wrap);

  const build = function() {
    const basis = document.getElementById("mlos-basis").value;
    const yearFilter = document.getElementById("mlos-year").value;
    const checked = [];
    assetCtrl.querySelectorAll("input[data-asset]").forEach(function(cb){
      if (cb.checked) checked.push(cb.getAttribute("data-asset"));
    });
    if (checked.length === 0) {
      clear(wrap);
      wrap.appendChild(el("div",{cls:"panel dim",text:"Select at least one asset."}));
      return;
    }
    // Filter rows
    let rows = DATA.monthly_table.filter(function(r){
      return r.Basis===basis && checked.indexOf(r.Asset)>=0 &&
        (yearFilter==="all" || String(r.Year)===yearFilter);
    });
    // Aggregate across selected assets by (Year, Month, Period)
    const agg = {};
    for (const r of rows) {
      const key = r.Year + "-" + (r.Month<10?"0":"") + r.Month;
      if (!agg[key]) {
        agg[key] = {
          Year:r.Year, Month:r.Month, Period:r.Period,
          ActiveWells:0, Oil_bbl:0, Gas_mcf:0, NGL_bbl:0, BOE:0,
          Oil_Revenue:0, Gas_Revenue:0, NGL_Revenue:0, Gross_Revenue:0,
          Gas_Netback:0, Severance:0, Adval:0,
          Var_Opex:0, Fixed_Opex:0, Workover:0, Total_Cash_Opex:0,
          Capex_T:0, Capex_I:0, Capex_U:0, Total_Capex:0,
          Net_Revenue:0, Cash_Op_Margin:0,
        };
      }
      const a = agg[key];
      for (const k of Object.keys(a)) {
        if (k==="Year" || k==="Month" || k==="Period") continue;
        a[k] += r[k] || 0;
      }
    }
    const periods = Object.keys(agg).sort().map(function(k){ return agg[k]; });

    // Activity filter: if threshold > 0, replace per-period Fixed/WO/ActiveWells
    // used ONLY for Fix $/Well-Mo and Workover $/Well-Mo calcs (stored on
    // separate fields so the original totals are preserved for sums).
    const useFilter = ACTIVITY_THRESHOLD > 0;
    for (const p of periods) {
      if (useFilter) {
        // Sum filtered values across selected assets for this (year, month)
        let fFix = 0, fWO = 0, fWells = 0;
        for (const a of checked) {
          const f = getFiltered(basis, a, p.Year, p.Month);
          if (f) { fFix += f.Fixed; fWO += f.WO; fWells += f.Wells; }
        }
        p.FiltFixed = fFix;
        p.FiltWO = fWO;
        p.FiltActiveWells = fWells;
      } else {
        p.FiltFixed = p.Fixed_Opex;
        p.FiltWO = p.Workover;
        p.FiltActiveWells = p.ActiveWells;
      }
    }

    // Derived metrics per period
    const safeDiv = function(n, d) { return d ? n/d : 0; };
    for (const p of periods) {
      p.Oil_Ratio = safeDiv(p.Oil_bbl, p.BOE);  // oil fraction of BOE
      p.Var_per_BOE = safeDiv(p.Var_Opex, p.BOE);
      // Fix $/Well-Mo and WO $/Well-Mo use FILTERED numerator AND denominator
      // per user decision (b): exclude low-producers from both sides of the ratio
      p.Fixed_per_Well = safeDiv(p.FiltFixed, p.FiltActiveWells);
      p.Workover_per_Well = safeDiv(p.FiltWO, p.FiltActiveWells);
      p.Total_Cash_per_BOE = safeDiv(p.Total_Cash_Opex, p.BOE);
      p.Realized_per_BOE = safeDiv(p.Gross_Revenue, p.BOE);
      p.Gas_Exp_per_Mcf = safeDiv(p.Gas_Netback, p.Gas_mcf);
      p.EBITDA = p.Net_Revenue - p.Total_Cash_Opex;  // = Cash_Op_Margin, kept for clarity
      p.EBITDA_Margin = safeDiv(p.EBITDA, p.Gross_Revenue);
      p.FCF = p.EBITDA - p.Total_Capex;
      p.FCF_Margin = safeDiv(p.FCF, p.Gross_Revenue);

      // Lifting cost $/BOE (var + fixed, excludes workover)
      p.Lifting_per_BOE = safeDiv(p.Var_Opex + p.Fixed_Opex, p.BOE);
      // Opex intensity = total cash opex / gross revenue
      p.Opex_Intensity = safeDiv(p.Total_Cash_Opex, p.Gross_Revenue);
      // Capex / EBITDA reinvestment rate
      p.Capex_EBITDA = safeDiv(p.Total_Capex, p.EBITDA);

      // Realized oil $/bbl, gas $/mcf, NGL $/bbl - raw realized prices
      p.Oil_realized_bbl = safeDiv(p.Oil_Revenue, p.Oil_bbl);
      p.Gas_realized_mcf = safeDiv(p.Gas_Revenue, p.Gas_mcf);
      p.NGL_realized_bbl = safeDiv(p.NGL_Revenue, p.NGL_bbl);

      // Benchmark diffs (only computable on Net basis; Gross revenue already at wellhead
      // so WTI/HH comps still apply if Gross is used).
      const yyyymm = String(p.Year) + "-" + (p.Month<10 ? "0" : "") + p.Month;
      const bench = (DATA.benchmarks && DATA.benchmarks[yyyymm]) || null;
      if (bench) {
        p.WTI_Settle = bench.wti;
        p.HH_Settle = bench.hh;
        // Oil diff = realized - WTI (negative = discount)
        p.Oil_Diff_WTI = (p.Oil_bbl !== 0 && bench.wti) ? (p.Oil_realized_bbl - bench.wti) : null;
        // Gas diff = realized $/Mcf - HH $/MMBtu (conversion: 1 Mcf ~ 1.0-1.1 MMBtu - treat 1:1 for simplicity)
        p.Gas_Diff_HH = (p.Gas_mcf !== 0 && bench.hh) ? (p.Gas_realized_mcf - bench.hh) : null;
        // NGL % of WTI
        p.NGL_pct_WTI = (p.NGL_bbl !== 0 && bench.wti) ? safeDiv(p.NGL_realized_bbl, bench.wti) : null;
      } else {
        p.WTI_Settle = p.HH_Settle = p.Oil_Diff_WTI = p.Gas_Diff_HH = p.NGL_pct_WTI = null;
      }
    }

    // Render
    clear(wrap);
    if (periods.length === 0) {
      wrap.appendChild(el("div",{cls:"panel dim",text:"No data for current filters."}));
      return;
    }

    const panel = el("div",{cls:"panel",style:"overflow-x:auto;"});
    const table = el("table",{style:"min-width:100%;"});
    const thead = el("thead");
    // Header row: line item | Period1 | Period2 | ... | Total
    const tr = el("tr");
    tr.appendChild(el("th",{text:"Line Item", style:"position:sticky; left:0; background:var(--panel); z-index:2; min-width:200px;"}));
    for (const p of periods) { tr.appendChild(el("th",{cls:"num",text:p.Period})); }
    tr.appendChild(el("th",{cls:"num",style:"background:var(--panel2);",text:"Total"}));
    thead.appendChild(tr);
    table.appendChild(thead);
    const tbody = el("tbody");

    // Rows: structured P&L
    const sections = [
      { title:"VOLUMES", rows:[
        {k:"Oil_bbl", label:"  Oil (bbl)", fmt:"num"},
        {k:"Gas_mcf", label:"  Gas (mcf)", fmt:"num"},
        {k:"NGL_bbl", label:"  NGL (bbl)", fmt:"num"},
        {k:"BOE",     label:"  BOE",       fmt:"num"},
      ]},
      { title:"GROSS REVENUE", rows:[
        {k:"Oil_Revenue",   label:"  Oil Sales",  fmt:"money"},
        {k:"Gas_Revenue",   label:"  Gas Sales",  fmt:"money"},
        {k:"NGL_Revenue",   label:"  NGL Sales",  fmt:"money"},
        {k:"Gross_Revenue", label:"  Total Gross Revenue", fmt:"money", bold:true},
      ]},
      { title:"REVENUE DEDUCTIONS", rows:[
        {k:"Gas_Netback", label:"  Gas Netback (gathering/processing/etc.)", fmt:"money"},
        {k:"Severance",   label:"  Severance Tax", fmt:"money"},
        {k:"Adval",       label:"  Ad Valorem (normalized)", fmt:"money"},
      ]},
      { title:"NET REVENUE", rows:[
        {k:"Net_Revenue", label:"  Net Revenue", fmt:"money", bold:true},
      ]},
      { title:"OPERATING EXPENSES", rows:[
        {k:"Var_Opex",   label:"  Variable Opex", fmt:"money"},
        {k:"Fixed_Opex", label:"  Fixed Opex",    fmt:"money"},
        {k:"Workover",   label:"  Workover",      fmt:"money"},
        {k:"Total_Cash_Opex", label:"  Total Cash Opex", fmt:"money", bold:true},
      ]},
      { title:"CAPITAL", rows:[
        {k:"Capex_T",    label:"  Capex - Tangible",   fmt:"money"},
        {k:"Capex_I",    label:"  Capex - Intangible", fmt:"money"},
        {k:"Capex_U",    label:"  Capex - Unsplit",    fmt:"money"},
        {k:"Total_Capex",label:"  Total Capex",        fmt:"money", bold:true},
      ]},
      { title:"EBITDA / FCF", rows:[
        {k:"EBITDA", label:"  EBITDA (Net Rev - Cash Opex)", fmt:"money", bold:true},
        {k:"FCF",    label:"  FCF (EBITDA - Capex)",         fmt:"money", bold:true},
      ]},
      { title:"METRICS", rows:[
        {k:"ActiveWells",         label:"  Active Wells (count)",      fmt:"int"},
        {k:"Realized_per_BOE",    label:"  Realized $/BOE",            fmt:"money2"},
        {k:"Oil_realized_bbl",    label:"  Oil realized $/bbl",        fmt:"money2"},
        {k:"Gas_realized_mcf",    label:"  Gas realized $/Mcf",        fmt:"money2"},
        {k:"NGL_realized_bbl",    label:"  NGL realized $/bbl",        fmt:"money2"},
        {k:"WTI_Settle",          label:"  WTI CMA settle $/bbl",      fmt:"money2"},
        {k:"HH_Settle",           label:"  Henry Hub LD settle $/MMBtu", fmt:"money2"},
        {k:"Oil_Diff_WTI",        label:"  Oil diff to WTI $/bbl",     fmt:"money2"},
        {k:"Gas_Diff_HH",         label:"  Gas diff to HH (sales $/Mcf - HH $/MMBtu)", fmt:"money2"},
        {k:"NGL_pct_WTI",         label:"  NGL % of WTI",              fmt:"pct"},
        {k:"Gas_Exp_per_Mcf",     label:"  Gas Exp $/Mcf",             fmt:"money2"},
        {k:"Var_per_BOE",         label:"  Var Opex $/BOE",            fmt:"money2"},
        {k:"Fixed_per_Well",      label:"  Fixed Opex $/Well",         fmt:"money"},
        {k:"Workover_per_Well",   label:"  Workover $/Well",           fmt:"money"},
        {k:"Lifting_per_BOE",     label:"  Lifting Cost $/BOE (var+fixed)", fmt:"money2"},
        {k:"Total_Cash_per_BOE",  label:"  Total Cash Cost $/BOE",     fmt:"money2"},
        {k:"Opex_Intensity",      label:"  Opex Intensity (Cash Opex / Rev)", fmt:"pct"},
        {k:"EBITDA_Margin",       label:"  EBITDA Margin (% Gross Rev)", fmt:"pct"},
        {k:"FCF_Margin",          label:"  FCF Margin (% Gross Rev)",    fmt:"pct"},
        {k:"Capex_EBITDA",        label:"  Capex / EBITDA",             fmt:"pct"},
      ]},
    ];

    const formatCell = function(v, fmt) {
      if (v === null || v === undefined || isNaN(v)) return "-";
      if (fmt==="num")    return fmtNum(v);
      if (fmt==="int")    return String(Math.round(v));
      if (fmt==="money")  return fmtMoneyFull(v);
      if (fmt==="money2") return fmtMoney2(v);
      if (fmt==="pct")    return fmtPct(v);
      return String(v);
    };

    for (const sec of sections) {
      const hdrRow = el("tr",{style:"background:var(--panel2);"});
      const hdrTd = el("td",{style:"position:sticky; left:0; background:var(--panel2); font-weight:600; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; font-size:10px;", text:sec.title});
      hdrTd.colSpan = periods.length + 2;
      hdrRow.appendChild(hdrTd);
      tbody.appendChild(hdrRow);
      for (const row of sec.rows) {
        const tr2 = el("tr");
        const labelTd = el("td",{style:"position:sticky; left:0; background:var(--panel); " + (row.bold?"font-weight:600;":"") });
        labelTd.textContent = row.label;
        tr2.appendChild(labelTd);
        let total = 0;
        let hasValidTotal = true;
        for (const p of periods) {
          const v = p[row.k];
          const cell = el("td",{cls:"num",text:formatCell(v, row.fmt)});
          if (row.bold) cell.style.fontWeight = "600";
          tr2.appendChild(cell);
          // Sum for Total column (only for dollar/volume totals, not per-unit metrics)
          if (row.fmt==="money" || row.fmt==="num" || row.fmt==="int") {
            total += (typeof v === "number" && !isNaN(v)) ? v : 0;
          } else {
            hasValidTotal = false;
          }
        }
        // Total column: for per-unit metrics, recompute from aggregated numerator/denominator
        let totalText = "-";
        if (hasValidTotal) {
          totalText = formatCell(total, row.fmt);
        } else if (row.fmt === "money2" || row.fmt === "pct" || row.fmt === "money") {
          // Recompute the ratio from totals
          const totSum = function(key) {
            return periods.reduce(function(s, p){ return s + (p[key]||0); }, 0);
          };
          const totSumWeighted = function(valKey, weightKey) {
            // Weighted average: sum(val * weight) / sum(weight), skipping nulls
            let num = 0, den = 0;
            for (const p of periods) {
              if (p[valKey] === null || p[valKey] === undefined) continue;
              const w = p[weightKey] || 0;
              num += p[valKey] * w;
              den += w;
            }
            return den ? num/den : 0;
          };
          let derived = 0;
          if (row.k === "Realized_per_BOE")   derived = safeDiv(totSum("Gross_Revenue"), totSum("BOE"));
          else if (row.k === "Oil_realized_bbl") derived = safeDiv(totSum("Oil_Revenue"), totSum("Oil_bbl"));
          else if (row.k === "Gas_realized_mcf") derived = safeDiv(totSum("Gas_Revenue"), totSum("Gas_mcf"));
          else if (row.k === "NGL_realized_bbl") derived = safeDiv(totSum("NGL_Revenue"), totSum("NGL_bbl"));
          else if (row.k === "Gas_Exp_per_Mcf")  derived = safeDiv(totSum("Gas_Netback"), totSum("Gas_mcf"));
          else if (row.k === "Var_per_BOE")      derived = safeDiv(totSum("Var_Opex"),    totSum("BOE"));
          else if (row.k === "Fixed_per_Well")   derived = safeDiv(totSum("FiltFixed"),  totSum("FiltActiveWells"));
          else if (row.k === "Workover_per_Well") derived = safeDiv(totSum("FiltWO"),    totSum("FiltActiveWells"));
          else if (row.k === "Lifting_per_BOE")   derived = safeDiv(totSum("Var_Opex")+totSum("Fixed_Opex"), totSum("BOE"));
          else if (row.k === "Total_Cash_per_BOE") derived = safeDiv(totSum("Total_Cash_Opex"), totSum("BOE"));
          else if (row.k === "Opex_Intensity")     derived = safeDiv(totSum("Total_Cash_Opex"), totSum("Gross_Revenue"));
          else if (row.k === "EBITDA_Margin")      derived = safeDiv(totSum("EBITDA"), totSum("Gross_Revenue"));
          else if (row.k === "FCF_Margin")         derived = safeDiv(totSum("FCF"),    totSum("Gross_Revenue"));
          else if (row.k === "Capex_EBITDA")       derived = safeDiv(totSum("Total_Capex"), totSum("EBITDA"));
          // Oil/gas diff: volume-weighted average of the diff series (skip null periods)
          else if (row.k === "Oil_Diff_WTI")       derived = totSumWeighted("Oil_Diff_WTI", "Oil_bbl");
          else if (row.k === "Gas_Diff_HH")        derived = totSumWeighted("Gas_Diff_HH", "Gas_mcf");
          else if (row.k === "NGL_pct_WTI")        derived = totSumWeighted("NGL_pct_WTI", "NGL_bbl");
          // WTI/HH settles: time-weighted (simple average across periods with a value)
          else if (row.k === "WTI_Settle" || row.k === "HH_Settle") {
            let n = 0, s = 0;
            for (const p of periods) { if (p[row.k] !== null && p[row.k] !== undefined) { s += p[row.k]; n++; } }
            derived = n ? s/n : 0;
          }
          totalText = formatCell(derived, row.fmt);
        }
        const totalTd = el("td",{cls:"num", style:"background:var(--panel2); font-weight:600;", text:totalText});
        tr2.appendChild(totalTd);
        tbody.appendChild(tr2);
      }
    }

    table.appendChild(tbody);
    panel.appendChild(table);
    wrap.appendChild(panel);
  };

  assetCtrl.querySelectorAll("input").forEach(function(cb){ cb.addEventListener("change", build); });
  ["mlos-basis","mlos-year"].forEach(function(id){ document.getElementById(id).addEventListener("change", build); });
  onActivityChange(build);  // rebuild when global activity threshold changes
  build();
}

    const rows = DATA.bucket_detail.filter(function(r){ return r.Year===y && (!a || r.Asset===a); });
    const grouped = {};
    for (const r of rows) {
      const key = r.Bucket + "|" + r.SubCategory;
      if (!grouped[key]) grouped[key] = { Bucket:r.Bucket, SubCategory:r.SubCategory, val:0 };
      grouped[key].val += r[b];
    }
    const bucketOrder = ["GAS_NETBACK","SEVERANCE","ADVAL","VAR_OPEX","FIX_OPEX","WORKOVER","CAPEX_T","CAPEX_I","CAPEX_U"];
    clear(wrap);

  const rows = [
    ["Volumes (oil, gas, NGL)", "as reported (NRI-basis)", "value / APO_NRI = physical gross volume"],
    ["Gross Revenue (oil+gas+NGL)", "as reported (Net to P10)", "value / APO_NRI = wellhead revenue"],
    ["Gas Netback (gathering/processing/marketing/compression)", "as reported", "value / APO_WI"],
    ["Severance Tax", "as reported", "value / APO_NRI (scales with NRI)"],
    ["Ad Valorem", "as reported (annual total / 12 per active month)", "value / APO_WI (same normalization applied)"],
    ["Variable, Fixed, Workover, Capex", "as reported", "value / APO_WI (costs allocated by WI)"],
  ];
  for (const r of rows) {
    const tr2 = el("tr");
    r.forEach(function(c){ tr2.appendChild(el("td",{text:c})); });
    tb.appendChild(tr2);
  }
  t.appendChild(tb);
  formulas.appendChild(t);
  root.appendChild(formulas);

  const actPanel = el("div",{cls:"panel"});
  actPanel.appendChild(el("h3",{style:"margin-top:0;",text:"Activity filter (fixed + workover per-well only)"}));
  actPanel.appendChild(el("p",{text:"Wells below a minimum Gross avg BOE/d threshold are excluded from BOTH the numerator AND denominator of Fixed $/Well-Mo and Workover $/Well-Mo. This removes the dilution from stripper/idle wells that contribute negligible production but count as 'active well-months' because they posted any LOE activity."}));
  actPanel.appendChild(el("p",{text:"Variable $/BOE, Realized $/BOE, Gross Revenue, BOE, Capex, and all P&L dollar totals are UNAFFECTED by the filter — only the two per-well ratios change."}));
  actPanel.appendChild(el("p",{style:"color:var(--text-dim);font-size:12px;",text:"Threshold options: Off (all wells), 0.5, 1.0 (default), 2.0, 5.0 BOE/d. The threshold is applied per well per year, using that well's Gross BOE total divided by its number of producing months (Gross basis, not Net, to avoid penalizing small-WI wells that produce meaningful physical volume)."}));
  actPanel.appendChild(el("p",{style:"color:var(--text-dim);font-size:12px;",text:"Impact at 1.0 BOE/d threshold (2025): ~11 wells excluded of 140 (8%), contributing <1% of BOE. Consolidated Fixed $/Well-Mo rises from ~$2,618 to ~$3,273 (+25%), Workover $/Well-Mo from ~$2,230 to ~$2,753 (+23%)."}));
  root.appendChild(actPanel);

  const advalCalc = el("div",{cls:"panel"});
  advalCalc.appendChild(el("h3",{style:"margin-top:0;",text:"Ad valorem normalization"}));
  advalCalc.appendChild(el("p",{text:"Ad valorem taxes are posted unevenly in the LOS source (often lumped into one month per year). For trend analysis they're normalized as: annual_total / 12 applied to each month with active production. Non-producing months show $0 ad val."}));
  advalCalc.appendChild(el("p",{style:"color:var(--text-dim);font-size:12px;",text:"Example: Hawkeye 2025 raw ad val = $335,443 (posted largely in October). Normalized = $335,443 / 12 = $27,954/month for the 4 active months (Sep-Dec) = $111,814 annual. This is what the annual rollup shows; as-posted retained for reference."}));
  root.appendChild(advalCalc);

  const caveat = el("div",{cls:"panel"});
  caveat.appendChild(el("h3",{style:"margin-top:0;",text:"Volume basis (confirmed NRI)"}));
  caveat.appendChild(el("p",{text:"Volume-basis test: compared LOS Jan 2026 net oil volumes to the Cash_Flow_10yrs forecast Net Oil (N OIL) for Feb 2026. Ratios:"}));
  const ul = el("ul",{style:"color: var(--text-dim); line-height: 1.8;"});
  ["Hawkeye: LOS/N_OIL = 1.07 (vs LOS/GR_OIL = 0.33)",
   "Strawn: LOS/N_OIL = 0.76 (vs LOS/GR_OIL = 0.25)",
   "Reeves: LOS/N_OIL = 0.95 (vs LOS/GR_OIL = 0.02)"]
    .forEach(function(t){ ul.appendChild(el("li",{text:t})); });
  caveat.appendChild(ul);
  caveat.appendChild(el("p",{text:"CONCLUSION: LOS volumes are at NRI (net) basis, consistent with the INSIDE SHARE convention. Gross LOS volumes = Net / APO_NRI (true physical gross)."}));
  caveat.appendChild(el("p",{style:"color:var(--text-dim);font-size:12px;",text:"Per-unit metrics ($/BOE, $/Mcf, $/well-mo) are basis-invariant - ratios are unchanged regardless of scaling convention."}));
  root.appendChild(caveat);

  const mw = el("div",{cls:"panel"});
  mw.appendChild(el("h3",{style:"margin-top:0;",text:"Well matching"}));
  mw.appendChild(el("p",{text:"177 selected wells matched to 157 unique entries in the 3/16/26 Oneline (well-specific scaling factors). 20 wells legitimately have no scalable entry - either (a) not in Oneline at all, or (b) Oneline entry with 0% WI (ORRI-only). See Scaling Factors tab for the full list; amber rows use asset-average fallback."}));
  mw.appendChild(el("p",{text:"Match methods: 142 exact name match, 1 loose match, 11 manual override (HAMMACK 1-4 renames, WILLIE 25 1H rename, JO ANN unit rename, Jesse James 5-4 name variants, etc.), 3 manual fuzzy, 20 asset-average fallback."}));
  root.appendChild(mw);

  const jointInfo = el("div",{cls:"panel"});
  jointInfo.appendChild(el("h3",{style:"margin-top:0;",text:"Joint wells (important for consolidated Gross)"}));
  jointInfo.appendChild(el("p",{text:"19 wells are held jointly between Peak 10 Strawn LP and Peak 10 Hawkeye LP (each entity has its own purchaser contracts and LOS reporting). 1 well (TATONKA UNIT #1H) is joint Genesis/Reeves. See Joint Wells tab for the complete list."}));
  jointInfo.appendChild(el("p",{style:"color:var(--text-dim);font-size:12px;",text:"Per-asset Gross LOS scaling is independently correct. At consolidated Gross level, the same physical well is reported under each entity and scaled up independently - producing double counting of volumes/revenue for these 19+1 wells. Per-asset views are unaffected."}));
  root.appendChild(jointInfo);

  const op = el("div",{cls:"panel"});
  op.appendChild(el("h3",{style:"margin-top:0;",text:"Operator context"}));
  op.appendChild(el("p",{text:"Per user confirmation: Peak 10 Strawn LP is operator-of-record for all Strawn + Hawkeye wells except:"}));
  const ul2 = el("ul",{style:"color: var(--text-dim); line-height: 1.8;"});
  ["YOSEMITE 12-27 1H - ORRI-only interest", "HANNAH 1H - non-operated", "MARTIN EAST 1H - non-operated"]
    .forEach(function(t){ ul2.appendChild(el("li",{text:t})); });
  op.appendChild(ul2);
  op.appendChild(el("p",{text:"Reeves and Genesis are fully non-operated (operators: Permian Resources, EOG, Diamondback). Cost scaling math is identical regardless of operator status."}));
  root.appendChild(op);
}

const renderFns = {
  summary: renderSummary, trends: renderTrends, annual: renderAnnual,
  gross: renderGross, monthly: renderMonthly,
  scaling: renderScaling, joint: renderJoint,
  buckets: renderBuckets, exceptions: renderExceptions, methodology: renderMethodology,
};
const rendered = {};
function switchTab(name) {
  document.querySelectorAll("#topnav button").forEach(function(b){ b.classList.toggle("active", b.dataset.tab===name); });
  document.querySelectorAll(".tab-content").forEach(function(t){ t.classList.toggle("active", t.id==="tab-"+name); });
  if (!rendered[name]) { renderFns[name](); rendered[name] = true; }
}
document.querySelectorAll("#topnav button").forEach(function(b){
  b.addEventListener("click", function(){ switchTab(b.dataset.tab); });
});
switchTab("summary");
</script>
</body>
</html>
